server:
  port: 8080

spring:
  application:
    name: ctms-api
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/ctms_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.ctms.entity
  global-config:
    db-config:
      id-type: ASSIGN_UUID
      logic-delete-field: isDeleted
      logic-delete-value: "1"
      logic-not-delete-value: "0"
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

minio:
  endpoint: http://${MINIO_HOST:localhost}:9000
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  buckets:
    raw: ctms-raw
    processed: ctms-processed
    archive: ctms-archive
    temp: ctms-temp

flowable:
  database-schema-update: true
  async-executor-activate: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.ctms: DEBUG
    org.flywaydb: INFO
